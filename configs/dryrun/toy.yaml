# Ultra-fast toy config for pipeline dry-run on a T4. Finishes in <1 min:
#   - resnet18 (11M params, small enough that full ImageFolder init fits
#     in under 30 s)
#   - batch 32, 2 epochs, no AMP, no EMA, no mixup
# The trainer sees the real 1.28M-image train set, but the cosine LR
# + tiny batch means 1 epoch is only a few thousand steps. That's
# plenty to verify: model build, optimizer, saver, complete sentinel,
# S3 sync heartbeat, W&B run id plumbing. NOT a recipe.

model: resnet18
num_classes: 1000
drop: 0.0
drop_path: 0.0

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 32
grad_accum_steps: 1
workers: 4

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 1.0e-4
lr_base_size: 32
lr_base_scale: none
weight_decay: 0.0

sched: cosine
epochs: 2
warmup_epochs: 0
warmup_lr: 1.0e-6
min_lr: 1.0e-6

aa: null
color_jitter: 0.0
smoothing: 0.0
mixup: 0.0
cutmix: 0.0
reprob: 0.0
remode: pixel

amp: false
torchcompile: null
torchcompile_mode: null
clip_grad: null
model_ema: false
seed: 42

activation: nelu
norm_axes: sample
log_gate_stats_every: 1000

# Toy ImageNet config for pipeline dry-run. Designed to finish in <2 min
# on a T4: 1 epoch over a 256-sample subset, batch 4, no validation,
# no AMP, no wandb image sync. Used by scripts/orchestrate.sh during
# infrastructure validation — NOT a training recipe.

model: convnext_tiny
num_classes: 1000
drop: 0.0
drop_path: 0.0

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 4
grad_accum_steps: 1
workers: 2

train_num_samples: 256
val_num_samples: 64

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 1.0e-4
lr_base_size: 4
lr_base_scale: none
weight_decay: 0.0

sched: cosine
epochs: 1
warmup_epochs: 0
warmup_lr: 1.0e-6
min_lr: 1.0e-6

aa: null
color_jitter: 0.0
smoothing: 0.0
mixup: 0.0
cutmix: 0.0
reprob: 0.0
remode: pixel

amp: false
torchcompile: null
torchcompile_mode: null
clip_grad: null
model_ema: false
seed: 42

activation: nelu
gamma_init: 1.0e-6
rms_mode: per_sample
log_gate_stats_every: 1000      # effectively disable gate-stats probe in toy

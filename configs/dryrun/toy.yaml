# Toy ImageNet config for dstack end-to-end dry-run.
#
# Purpose: verify the entire worker pipeline (spot VM → EBS attach →
# container privileged mount → S3 lease → trainer → SIGTERM resume)
# without burning real GPU time. 2 epochs on a 512-sample subset.
# The model is convnext_tiny + NELU so the fused CUDA path is exercised.

model: convnext_tiny
num_classes: 1000
drop: 0.0
drop_path: 0.0
model_kwargs:
  layer_scale_init_value: 1.0e-6

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 16
grad_accum_steps: 1
workers: 2

# --- subset tokens the trainer uses to stop after a handful of steps
train_num_samples: 512
val_num_samples: 512

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 1.0e-4
lr_base_size: 16
lr_base_scale: none
weight_decay: 0.05

sched: cosine
epochs: 2
warmup_epochs: 0
warmup_lr: 1.0e-6
min_lr: 1.0e-6

aa: null
color_jitter: 0.0
smoothing: 0.0
mixup: 0.0
cutmix: 0.0
reprob: 0.0
remode: pixel

amp: true
torchcompile: null
torchcompile_mode: null
clip_grad: null
model_ema: false
seed: 42

activation: nelu
gamma_init: 1.0e-6
rms_mode: per_sample
log_gate_stats_every: 1

# CIFAR-100 default recipe (matches original pytorch-cifar100 standard)
# SGD + MultiStepLR with 1-epoch linear warmup
model: resnet20
dataset: cifar100
data_path: /data
epochs: 200
batch_size: 128
lr: 0.1
opt: sgd
momentum: 0.9
weight_decay: 5.0e-4
scheduler: multistep
milestones: [60, 120, 160]
lr_gamma: 0.2
warmup_epochs: 1
amp: true
compile: true

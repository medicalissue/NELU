# ConvNeXt-Tiny, ImageNet-1k from scratch.
#
# Recipe ported verbatim from MMPretrain's reproduced config
#   https://github.com/open-mmlab/mmpretrain/blob/main/configs/convnext/convnext-tiny_32xb128_in1k.py
# Reported Top-1 82.14 % (paper: 82.1 %). Effective batch 4096.
#
# The MMPretrain ConvNeXt pipeline uses RandAugment + RandomErasing
# (mode='rand') and specifically does *not* apply ColorJitter on top of
# RandAugment — we match that here.

model: convnext_tiny
num_classes: 1000
drop: 0.0
drop_path: 0.1
model_kwargs:
  ls_init_value: 1.0e-6        # timm uses `ls_init_value` (formerly
                               # `layer_scale_init_value`) for ConvNeXt.

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 512              # 512 × 8 GPUs = 4096 effective, no grad accum
validation_batch_size: 1024  # 2× train batch: eval has no optimizer state / grads,
                             # so activations fit comfortably and eval finishes ~2× faster.
grad_accum_steps: 1          # H100-80GB + bf16 holds the full micro-batch
workers: 10
pin_mem: true              # pinned host memory → faster GPU transfer (~10%)

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 4.0e-3
lr_base_size: 4096
lr_base_scale: linear
weight_decay: 0.05
# timm's create_optimizer_v2 sets filter_bias_and_bn=True by default, so
# LayerNorm weights and all biases are automatically placed in a no-wd
# parameter group — this matches MMPretrain's norm/bias/flat_decay_mult=0.

sched: cosine
epochs: 300
warmup_epochs: 20
warmup_lr: 4.0e-6            # start_factor 1e-3 × base_lr 4e-3
min_lr: 1.0e-5

aa: rand-m9-mstd0.5-inc1
color_jitter: 0.0            # MMPretrain pipeline has no ColorJitter
smoothing: 0.1
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5
reprob: 0.25
remode: rand                 # MMPretrain RandomErasing mode='rand'

amp: true
amp-dtype: bfloat16             # bf16 on tensor cores: no GradScaler, no underflow
# torch.compile is opt-in; set to "inductor" to enable. Gate-Normalization
# registers torch.library.custom_op's for the fused CUDA kernels, so
# Dynamo traces them without graph breaks.
torchcompile: null
torchcompile_mode: null
clip_grad: null
model_ema: true
model_ema_decay: 0.9999      # MMPretrain EMAHook momentum=1e-4 ⇒ decay 1−1e-4
seed: 42

activation: gelu
norm_axes: [-1]               # ConvNeXt block = ViT-style FFN; activation
                             # follows a channel-mixing Linear at channels-last
                             # layout (N,H,W,C), so RMS axis is the channel dim.
log_gate_stats_every: 1

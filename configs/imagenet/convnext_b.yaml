# ConvNeXt-Base on ImageNet-1k
# FB recipe with higher drop_path for the largest model
# Expected: ~83.8% top-1 (GELU baseline)
model: convnext_base
dataset: imagenet
data_path: /data/imagenet
epochs: 300
batch_size: 512         # per GPU; effective batch = 512 * 8 = 4096
update_freq: 1
lr: 4.0e-3
warmup_epochs: 20
weight_decay: 0.05
drop_path: 0.5
opt: adamw
use_amp: true
model_ema: true
model_ema_decay: 0.9999
mixup: 0.8
cutmix: 1.0
smoothing: 0.1
reprob: 0.25
color_jitter: 0.4
aa: rand-m9-mstd0.5-inc1
repeated_aug: true

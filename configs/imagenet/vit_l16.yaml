# ViT-Large/16 on ImageNet-1k
# DeiT recipe extended to ViT-L (higher drop_path, same optimizer)
# Training time: ~90h on 8xH100 per activation
model: vit_large_patch16_224
dataset: imagenet
data_path: /data/imagenet
epochs: 300
batch_size: 64           # per GPU; 64 * 8 = 512 effective (memory limited)
lr: 5.0e-4              # 5e-4 * (512/512) = no scaling
opt: adamw
weight_decay: 0.05
sched: cosine
warmup_epochs: 5
warmup_lr: 1.0e-6
min_lr: 1.0e-5
drop_path: 0.4
mixup: 0.8
cutmix: 1.0
smoothing: 0.1
reprob: 0.25
remode: pixel
aa: rand-m9-mstd0.5-inc1
color_jitter: 0.3
amp: true
compile: true
model_ema: true
model_ema_decay: 0.99996

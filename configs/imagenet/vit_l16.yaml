# ViT-Large/16 on ImageNet-1k
# DeiT recipe (Touvron et al., 2021) adapted for ViT-L
# drop_path scaled up from DeiT-B (0.1) for deeper model (24 vs 12 layers)
# Training time: ~90h on 8xH100 per activation
model: vit_large_patch16_224
dataset: imagenet
data_path: /data/imagenet
epochs: 300
batch_size: 128          # per GPU; 128 * 8 = 1024 effective
lr: 1.0e-3              # 5e-4 * (1024/512) linear scaling from DeiT-B base
opt: adamw
weight_decay: 0.05
sched: cosine
warmup_epochs: 5
warmup_lr: 1.0e-6
min_lr: 1.0e-5
drop_path: 0.4          # scaled up from DeiT-B 0.1 for 24-layer model
mixup: 0.8
cutmix: 1.0
smoothing: 0.1
reprob: 0.25
remode: pixel
aa: rand-m9-mstd0.5-inc1
color_jitter: 0.3
repeated_aug: true
amp: true
compile: true
model_ema: true
model_ema_decay: 0.99996

# ViT-Large/16 on ImageNet-1k — DeiT-III recipe (paper-exact, 300ep variant)
# Reference (verified against source): Touvron et al., 2022 (arXiv:2204.07118v2)
#   Paper: Table 1 ("Training recipe"), Section 3
#   Code:  github.com/facebookresearch/deit, README_revenge.md line 745
#          (ViT-L/16 training command); main.py arg defaults.
#
# Paper's 400-epoch IN-1k schedule → 84.0% top-1 (Table 2).
# 800-epoch version (not used here) reaches 84.9%.
#
# Identical to vit_b16.yaml except:
#   - `drop_path`: 0.2 → 0.45 (paper Table 1; deeper stack)
#   - `init_scale`: 1e-4 (same as B; paper uses 1e-4 for ALL sizes)

# ── Model ───────────────────────────────────────────────────────
model: vit_large_patch16_224
pretrained: false
num_classes: 1000
drop: 0.0
drop_path: 0.45                 # README L745 --drop-path 0.45
init_scale: 1.0e-4              # Table 1: init_scale=1e-4 for ALL sizes
                                # (my earlier 1e-5 was wrong)

# ── Data ────────────────────────────────────────────────────────
data_path: /data/imagenet
input_size: 224                 # single-stage training (see vit_b16.yaml note)
batch_size: 128                 # per GPU; 128 × 8 × update_freq=2 = 2048
                                # (paper uses 64×32 = 2048; our 256/GPU hit
                                # OOM-adjacent backward version mismatch —
                                # 128/GPU gives ~37 GB peak with room to spare)
val_batch_size: 256
workers: 10

# ── Optimizer (paper: FusedLAMB + --unscale-lr) ─────────────────
opt: lamb                       # timm "lamb" maps to Lamb (≈FusedLAMB)
opt_eps: 1.0e-6                 # timm Lamb default
lr: 3.0e-3                      # README L745 --lr 3e-3
weight_decay: 0.02              # paper Table 1 (authoritative over README)
unscale_lr: true                # README L745 --unscale-lr

# ── Scheduler ───────────────────────────────────────────────────
sched: cosine
epochs: 400                     # paper 400-epoch schedule (Table 2)
warmup_epochs: 5                # README L745 --warmup-epochs 5
warmup_lr: 1.0e-6               # README L745 --warmup-lr 1e-6
min_lr: 1.0e-5                  # main.py L81 default

# ── Augmentation / regularization ───────────────────────────────
deit3_transform: true
aa: null
color_jitter: 0.3               # README L745 --color-jitter 0.3
smoothing: 0.0                  # BCE instead
bce_loss: true                  # README L745 --bce-loss
mixup: 0.8                      # README L745 --mixup 0.8
mixup_prob: 1.0                 # main.py L134 default
cutmix: 1.0                     # README L745 --cutmix 1.0
reprob: 0.0                     # README L745 --reprob 0.0
remode: pixel                   # (ignored)
repeated_aug: true              # README L745 --repeated-aug; Table 1 "RA ✓"

# ── Training ────────────────────────────────────────────────────
amp: true
clip_grad: 1.0                  # paper Table 1 (authoritative over README)
update_freq: 2                  # → effective batch 2048 (128 × 8 × 2)
model_ema: false                # paper Table 1 "EMA ✗"
model_ema_decay: 0.9999         # (unused)
seed: 42

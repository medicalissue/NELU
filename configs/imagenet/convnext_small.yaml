# ConvNeXt-Small, ImageNet-1k from scratch.
#
# Recipe ported verbatim from MMPretrain's reproduced config
#   https://github.com/open-mmlab/mmpretrain/blob/main/configs/convnext/convnext-small_32xb128_in1k.py
# Reported Top-1 83.16 % (paper: 83.1 %). Effective batch 4096. Differs
# from convnext_tiny only in the model name and drop_path.

model: convnext_small
num_classes: 1000
drop: 0.0
drop_path: 0.4
model_kwargs:
  layer_scale_init_value: 1.0e-6

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 256              # 256 × 8 GPUs × grad_accum 2 = 4096 effective
grad_accum_steps: 2          # H100-80GB handles per-GPU 256 easily in bf16
workers: 10

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 4.0e-3
lr_base_size: 4096
lr_base_scale: linear
weight_decay: 0.05
# filter_bias_and_bn=True (timm default) handles norm/bias wd=0 automatically.

sched: cosine
epochs: 300
warmup_epochs: 20
warmup_lr: 4.0e-6
min_lr: 1.0e-5

aa: rand-m9-mstd0.5-inc1
color_jitter: 0.0
smoothing: 0.1
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5
reprob: 0.25
remode: rand

amp: true
torchcompile: null              # "inductor" to enable torch.compile
torchcompile_mode: null
clip_grad: null
model_ema: true
model_ema_decay: 0.9999
seed: 42

activation: gelu
gamma_init: 1.0e-6
rms_mode: per_sample
log_gate_stats_every: 1

# DeiT-Base sanity probe: γ fixed at 1.0 (no warmup, no schedule).
#
# Purpose: confirm whether DeiT-Base + NELU diverges with γ=1 from the
# very first step, isolating the γ-schedule from the architecture.
# Limited to 15 epochs — enough to clear LR warmup and observe the
# divergence regime previously seen around ep 9–11.
#
# All other knobs identical to deit_base.yaml.

model: deit_base_patch16_224
num_classes: 1000
drop: 0.0
drop_path: 0.1

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 256
validation_batch_size: 512
grad_accum_steps: 1
workers: 10
pin_mem: true

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 1.0e-3
lr_base_size: 1024
lr_base_scale: linear
weight_decay: 0.05

sched: cosine
epochs: 15
warmup_epochs: 5            # Compressed warmup so we land in steady-state quickly.
warmup_lr: 1.0e-6
min_lr: 1.0e-5

aa: rand-m9-mstd0.5-inc1
color_jitter: 0.0
smoothing: 0.1
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5
reprob: 0.25
remode: rand

amp: true
amp-dtype: bfloat16
torchcompile: null
torchcompile_mode: null
clip_grad: 5.0
model_ema: true
model_ema_decay: 0.9999
seed: 42

activation: nelu
norm_axes: [-1]
log_gate_stats_every: 1

# γ fixed at 1.0 from step 0.
gamma_init: 1.0
gamma_final: 1.0
gamma_warmup_schedule: constant

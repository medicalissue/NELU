# DeiT-Base/16 (Touvron et al. 2020), ImageNet-1k from scratch.
#
# Recipe ported verbatim from MMPretrain's reproduced config
#   https://github.com/open-mmlab/mmpretrain/blob/main/configs/deit/deit-base_16xb64_in1k.py
#   + _base_/schedules/imagenet_bs1024_adamw_swin.py
# Reported Top-1 81.76 % (paper: 81.8 %). Effective batch 1024.
#
# DeiT-Base reintroduces drop_path=0.1 and adds EMA (momentum=4e-5
# ⇒ decay ≈ 0.99996) that the Small variant omits.

model: deit_base_patch16_224
num_classes: 1000
drop: 0.0
drop_path: 0.1
model_kwargs:
  init_values: 1.0e-6          # LayerScale (Touvron et al., CaiT 2021).

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 256              # 256 × 8 GPUs = 2048 effective (2× MMPretrain base;
                             # lr_base_scale=linear scales lr 1e-3 → 2e-3 automatically)
validation_batch_size: 512   # 2× train batch: eval has no optimizer state / grads,
                             # so activations fit comfortably and eval finishes ~2× faster.
grad_accum_steps: 1
workers: 10
pin_mem: true              # pinned host memory → faster GPU transfer (~10%)

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 1.0e-3
lr_base_size: 1024
lr_base_scale: linear
weight_decay: 0.05
# filter_bias_and_bn=True (timm default) + no_weight_decay() cover
# bias, LayerNorm weight, cls_token, and pos_embed.

sched: cosine
epochs: 300
warmup_epochs: 20
warmup_lr: 1.0e-6
min_lr: 1.0e-5

aa: rand-m9-mstd0.5-inc1
color_jitter: 0.0
smoothing: 0.1
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5
reprob: 0.25
remode: rand

amp: true
amp-dtype: bfloat16
torchcompile: null              # "inductor" to enable torch.compile
torchcompile_mode: null
clip_grad: 5.0
model_ema: true
model_ema_decay: 0.9999      # Unified across all archs (MMPretrain used 0.99996
                             # for DeiT-B only; we use 0.9999 so eval_top1 is
                             # directly comparable across the whole ImageNet sweep).
seed: 42

activation: gelu
# norm_axes omitted — default "position" alias rank-dispatches to the
# token axis (1,) for 3-D ViT activations: pool over tokens to estimate
# per-channel scale, then apply per-channel γ_c, β_c gate.
gamma_init: 1.0
log_gate_stats_every: 1

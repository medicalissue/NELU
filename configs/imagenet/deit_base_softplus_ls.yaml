# DeiT-Base + softplus learnable γ (init γ_eff = 1.0) + LayerScale (init 1e-6).
#
# Recipe identical to deit_base.yaml; only adds:
#   - gamma_init: 1.0      (softplus(γ_raw) = 1.0 at step 0)
#   - model_kwargs.init_values: 1e-6   (LayerScale)
#
# Hypothesis: LayerScale damps residual magnitude at init so the deep
# stack starts in a stable-trainable regime even with strong NELU
# nonlinearity (γ_eff = 1.0). Without LayerScale, vanilla DeiT-Base
# previously plateaued / regressed under NELU.

model: deit_base_patch16_224
num_classes: 1000
drop: 0.0
drop_path: 0.1

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 256
validation_batch_size: 512
grad_accum_steps: 1
workers: 10
pin_mem: true

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 1.0e-3
lr_base_size: 1024
lr_base_scale: linear
weight_decay: 0.05

sched: cosine
epochs: 300
warmup_epochs: 20
warmup_lr: 1.0e-6
min_lr: 1.0e-5

aa: rand-m9-mstd0.5-inc1
color_jitter: 0.0
smoothing: 0.1
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5
reprob: 0.25
remode: rand

amp: true
amp-dtype: bfloat16
torchcompile: null
torchcompile_mode: null
clip_grad: 5.0
model_ema: true
model_ema_decay: 0.9999
seed: 42

activation: nelu
norm_axes: [-1]
log_gate_stats_every: 1

# γ_raw init = 1.0  →  γ_eff = softplus(1.0) ≈ 1.313 at step 0
gamma_init: 1.0

# LayerScale: timm's deit_base_patch16_224 enables it when init_values is set.
model_kwargs:
  init_values: 1.0e-6

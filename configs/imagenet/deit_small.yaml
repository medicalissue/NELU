# DeiT-Small/16 (Touvron et al. 2020), ImageNet-1k from scratch.
#
# Recipe ported verbatim from MMPretrain's reproduced config
#   https://github.com/open-mmlab/mmpretrain/blob/main/configs/deit/deit-small_4xb256_in1k.py
#   + _base_/schedules/imagenet_bs1024_adamw_swin.py
# Reported Top-1 80.69 % (paper: 79.8 %). Effective batch 1024.
#
# The DeiT-Small variant in MMPretrain *explicitly removes* drop_path
# (comment in the config) and omits EMA; DeiT-Base reintroduces both.

model: deit_small_patch16_224
num_classes: 1000
drop: 0.0
drop_path: 0.0               # MMPretrain explicitly removes drop_path for small

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875              # ResizeEdge(256) + CenterCrop(224) ⇒ 224/256
batch_size: 256              # 256 × 8 GPUs = 2048 effective (2× MMPretrain base;
                             # lr_base_scale=linear scales lr 1e-3 → 2e-3 automatically)
grad_accum_steps: 1
workers: 10
pin_mem: true              # pinned host memory → faster GPU transfer (~10%)

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 1.0e-3              # auto_scale_lr.base_batch_size = 1024
lr_base_size: 1024
lr_base_scale: linear
weight_decay: 0.05
# filter_bias_and_bn=True (timm default) handles norm/bias wd=0 automatically.
# timm's VisionTransformer also declares cls_token and pos_embed in
# no_weight_decay(), so MMPretrain's custom_keys are covered too.

sched: cosine
epochs: 300
warmup_epochs: 20            # MMPretrain LinearLR end=20
warmup_lr: 1.0e-6            # start_factor 1e-3 × base_lr 1e-3
min_lr: 1.0e-5

aa: rand-m9-mstd0.5-inc1
color_jitter: 0.0            # MMPretrain pipeline has no ColorJitter
smoothing: 0.1
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5
reprob: 0.25
remode: rand                 # MMPretrain RandomErasing mode='rand'

amp: true
amp-dtype: bfloat16
torchcompile: null              # "inductor" to enable torch.compile
torchcompile_mode: null
clip_grad: 5.0               # MMPretrain optim_wrapper.clip_grad.max_norm
model_ema: false             # DeiT-Small explicitly drops EMA
seed: 42                     # MMPretrain uses None (random); we pin for comparability

activation: gelu
gamma_init: 0.0
norm_axes: [-1]               # DeiT FFN activation follows a channel-mixing
                             # Linear (fc1) on (N, L, D); RMS axis is the
                             # channel dim = last axis.
log_gate_stats_every: 1

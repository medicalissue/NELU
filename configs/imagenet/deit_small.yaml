# DeiT-Small/16 (Touvron et al. 2020), ImageNet-1k from scratch.
#
# Recipe ported from MMPretrain's reproduced config
#   https://github.com/open-mmlab/mmpretrain/blob/main/configs/deit/deit-small_4xb256_in1k.py
# Reported Top-1 80.69 % (paper: 79.8 %). Effective batch 1024.
#
# timm ships this model as `deit_small_patch16_224`.

model: deit_small_patch16_224
num_classes: 1000
drop: 0.0
drop_path: 0.1

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 128           # 128 × 8 GPUs = 1024 effective
grad_accum_steps: 1
workers: 10

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 1.0e-3           # auto_scale_lr.base_batch_size = 1024
lr_base_size: 1024
lr_base_scale: linear
weight_decay: 0.05

sched: cosine
epochs: 300
warmup_epochs: 5
warmup_lr: 1.0e-6
min_lr: 1.0e-5

aa: rand-m9-mstd0.5-inc1
color_jitter: 0.4
smoothing: 0.1
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5
reprob: 0.25
remode: pixel

amp: true
clip_grad: null
model_ema: false          # DeiT (origin) recipe does not use EMA
seed: 42

activation: gelu
gamma_init: 1.0e-6
rms_mode: per_token
log_gate_stats_every: 1

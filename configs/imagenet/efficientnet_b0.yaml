# EfficientNet-B0 (Tan & Le 2019), ImageNet-1k from scratch.
#
# Recipe taken from timm's own authoritative training script
#   https://github.com/huggingface/pytorch-image-models/blob/main/hfdocs/source/training_script.mdx
# section "EfficientNet-B0 with RandAugment". Matches the `efficientnet_b0.ra_in1k`
# checkpoint on HuggingFace (Top-1 77.70 % @ 224, paper: 77.3 %).
#
# MMPretrain has EfficientNet configs but does not reproduce training for any
# of the EfficientNet variants, so timm is the canonical source here.

model: efficientnet_b0
num_classes: 1000
drop: 0.2
drop_path: 0.2

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 128           # 128 × 8 GPUs = 1024 effective
grad_accum_steps: 1
workers: 10

opt: rmsproptf
opt_eps: 1.0e-3
lr_base: 0.048            # timm cmd: --lr 0.048 at effective batch 768 (2 × 384)
lr_base_size: 768
lr_base_scale: linear
weight_decay: 1.0e-5
momentum: 0.9

sched: step
epochs: 450
decay_epochs: 2.4
decay_rate: 0.97
warmup_epochs: 3
warmup_lr: 1.0e-6
min_lr: 1.0e-6

aa: rand-m9-mstd0.5
color_jitter: 0.4
smoothing: 0.1
mixup: 0.0
cutmix: 0.0
reprob: 0.2
remode: pixel

amp: true
torchcompile: null              # "inductor" to enable torch.compile
torchcompile_mode: null
clip_grad: null
model_ema: true
model_ema_decay: 0.9999
seed: 42

activation: silu
gamma_init: 1.0e-6
rms_mode: per_sample         # Initial swap default; overridden per-location
                             # by rewire_efficientnet_mbconv in train/swap.py:
                             # MBConv conv_pw-adjacent activation uses (1,)
                             # (channel mixing), conv_dw-adjacent uses (2, 3)
                             # (spatial mixing).
log_gate_stats_every: 1

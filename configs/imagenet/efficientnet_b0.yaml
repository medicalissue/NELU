# EfficientNet-B0 on ImageNet-1k
# timm RandAugment recipe: https://github.com/huggingface/pytorch-image-models
# Expected: ~77.7% top-1 (SiLU baseline)
model: efficientnet_b0
dataset: imagenet
data_path: /data/imagenet
epochs: 450
batch_size: 128         # per GPU; 128 * 8 = 1024 effective
lr: 0.032               # 0.016 * sqrt(1024/256) — sqrt scaling from 2 GPU * 128
opt: rmsproptf
opt_eps: 0.001
sched: step
decay_epochs: 2.4
decay_rate: 0.97
weight_decay: 1.0e-5
drop: 0.2
drop_connect: 0.2
amp: true
model_ema: true
model_ema_decay: 0.9999
aa: rand-m9-mstd0.5
remode: pixel
reprob: 0.2

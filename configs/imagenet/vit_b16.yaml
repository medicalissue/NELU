# ViT-Base/16 on ImageNet-1k — AugReg recipe ("medium2")
# Reference: Steiner et al., 2021 (arXiv:2106.10270)
#            + google-research/big_vision/configs/vit_i1k.py
# Expected: ~79.9% top-1 (from-scratch on IN-1k, GELU baseline)
#
# Known deviations from paper (not settable without further code work):
#   - loss: softmax CE with smoothing=0 (paper uses sigmoid CE, head bias init -6.9)
#   - optimizer: AdamW (= decoupled Adam); paper uses "Adam + decoupled wd",
#     which is mathematically identical to AdamW with wd=1e-4.

# ── Model ───────────────────────────────────────────────────────
model: vit_base_patch16_224
pretrained: false
num_classes: 1000
drop: 0.1                       # paper §3.3: 0 or 0.1 sweep; 0.1 selected
drop_path: 0.1                  # paired with drop (0 or 0.1)

# ── Data ────────────────────────────────────────────────────────
data_path: /data/imagenet
input_size: 224
batch_size: 256                 # per GPU; 256 × 8 GPUs × update_freq=2 = 4096
val_batch_size: 512
workers: 10

# ── Optimizer (paper: Adam + decoupled wd ≡ AdamW) ──────────────
opt: adamw
opt_eps: 1.0e-8
lr: 1.0e-3                      # peak, paired with effective batch 4096
weight_decay: 1.0e-4            # paper §3.3: "0.1 × LR", decoupled

# ── Scheduler ───────────────────────────────────────────────────
sched: cosine
epochs: 300
warmup_epochs: 32               # 10,000 steps @ batch 4096 ≈ 32 epochs
warmup_lr: 1.0e-6
min_lr: 0.0                     # paper: cosine decay → 0

# ── Augmentation / regularization ───────────────────────────────
aa: rand-m15-n2-mstd0.5         # paper "medium2": N=2, M=15
color_jitter: 0.0               # not used (inception crop + flip only)
smoothing: 0.0                  # paper uses sigmoid x-ent, no label smoothing
mixup: 0.5                      # paper "medium2" Mixup α=0.5
mixup_prob: 0.5                 # paper "medium2" Mixup p=0.5
cutmix: 0.0                     # not used
reprob: 0.0                     # not used
remode: pixel                   # (ignored when reprob=0)
repeated_aug: false

# ── Training ────────────────────────────────────────────────────
amp: true
clip_grad: 1.0                  # paper §3.4: global-norm clip 1.0
update_freq: 2                  # → effective batch 4096 (256 × 8 × 2)
model_ema: false                # paper: no EMA
model_ema_decay: 0.9999         # (unused)
seed: 42

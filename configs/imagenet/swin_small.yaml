# Swin-Small (Liu et al. 2021), ImageNet-1k from scratch.
#
# Recipe ported verbatim from MMPretrain's reproduced config
#   https://github.com/open-mmlab/mmpretrain/blob/main/configs/swin_transformer/swin-small_16xb64_in1k.py
#   + _base_/schedules/imagenet_bs1024_adamw_swin.py
# Reported Top-1 83.02 % (paper: 83.0 %). Effective batch 1024. Differs
# from swin_tiny.yaml only in the model name and drop_path.

model: swin_small_patch4_window7_224
num_classes: 1000
drop: 0.0
drop_path: 0.3

data_dir: /data/imagenet
input_size: [3, 224, 224]
train_interpolation: bicubic
crop_pct: 0.875
batch_size: 128
grad_accum_steps: 1
workers: 10

opt: adamw
opt_eps: 1.0e-8
opt_betas: [0.9, 0.999]
lr_base: 1.0e-3
lr_base_size: 1024
lr_base_scale: linear
weight_decay: 0.05
# Same no-wd handling as swin_tiny.yaml — bias/LN/abs_pos_embed/rel_pos_bias_table.

sched: cosine
epochs: 300
warmup_epochs: 20
warmup_lr: 1.0e-6
min_lr: 1.0e-5

aa: rand-m9-mstd0.5-inc1
color_jitter: 0.0
smoothing: 0.1
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5
reprob: 0.25
remode: rand

amp: true
torchcompile: null              # "inductor" to enable torch.compile
torchcompile_mode: null
clip_grad: 5.0
model_ema: false
seed: 42

activation: gelu
gamma_init: 1.0e-6
rms_mode: [-1]               # Swin FFN activation follows a channel-mixing
                             # Linear (fc1) on (N, L, D); RMS axis is the
                             # channel dim = last axis.
log_gate_stats_every: 1

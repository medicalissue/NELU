# CIFAR-100 default recipe — ResNet family, standard He et al. 2015 setup.
# Drop-in for train/cifar.py; override any field on the command line.

model: resnet20
activation: relu            # relu | gelu | silu | nelu | nilu

# ── Data ────────────────────────────────────────────────────────
data_dir: /data
batch_size: 128
val_batch_size: 256
num_workers: 4

# ── Optimizer ───────────────────────────────────────────────────
optimizer: sgd
lr: 0.1
momentum: 0.9
weight_decay: 5.0e-4

# ── Scheduler ───────────────────────────────────────────────────
scheduler: multistep
epochs: 200
milestones: [60, 120, 160]
lr_gamma: 0.2
warmup_epochs: 1
warmup_start_factor: 1.0e-3
min_lr: 0.0

# ── Gate Normalization ──────────────────────────────────────────
gamma_init: 1.0e-6
rms_mode: per_sample

# ── Runtime ─────────────────────────────────────────────────────
amp: true
amp_dtype: float16            # `bfloat16` on Hopper removes the need for GradScaler
compile: true
compile_mode: null            # null|default|reduce-overhead|max-autotune
compile_backend: inductor
seed: 42

# Ephemeral fleet for the real campaign: up to 4 H100:8 spot VMs in
# us-west-2d. Fleet scales 0..4 on demand; instances are torn down
# after idle_duration.

type: fleet
name: nelu-h100-fleet
nodes: 0..4
placement: any

backends: [aws]
regions: [us-west-2]
availability_zones: [us-west-2d]
spot_policy: spot

resources:
  gpu:
    name: [H100]
    count: 8

idle_duration: 2m

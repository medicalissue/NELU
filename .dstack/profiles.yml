# dstack profiles for the Gate-Normalization spot campaign.
#
# A single profile (`h100-spot-usw2`) pins every run to AWS us-west-2
# spot capacity, allowed in AZs a/b/c/d. The retry block keeps the run
# alive across (a) initial no-capacity, (b) spot preemption during run,
# and (c) transient non-zero exits, for up to 72 h of wall time.

profiles:
  - name: h100-spot-usw2
    default: true
    backends: [aws]
    regions: [us-west-2]
    availability_zones: [us-west-2d] # us-west-2a, us-west-2b, us-west-2c, 
    spot_policy: spot
    max_duration: 72h
    retry:
      on_events: [no-capacity, interruption, error]
      duration: 72h

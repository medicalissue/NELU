# One worker. A worker VM boots once, attaches a fresh EBS volume from
# the dataset snapshot, then loops through the S3 job queue until every
# experiment has a completion sentinel. Submit multiple copies (with
# different --name) to run workers in parallel.
#
# Launch example:
#   source .env
#   dstack apply -f .dstack/worker.dstack.yml -n worker-1 -y -d
#
# Requires an instance profile with EC2 CreateVolume/AttachVolume/
# DetachVolume/DeleteVolume + S3 read(nelu-datasets)/write(nelu-
# checkpoints) permissions. Pre-created in scripts/infra/ as
# `nelu-worker-profile`.

type: task
name: nelu-worker
image: nvcr.io/nvidia/pytorch:24.08-py3
# --privileged lets orchestrate.sh mount the EBS volume the worker
# creates at boot (dstack runs the task in a container by default; the
# flag gives us access to host /dev so the mount call succeeds).
privileged: true

# Upload the current repo to /workspace so `bash scripts/...` finds the
# scripts and `pip install -e .[train]` picks up pyproject.toml.
repos:
  - .:/workspace
working_dir: /workspace

resources:
  gpu: H100:8
  shm_size: 64GB
  disk: 256GB

env:
  - DATA_SNAPSHOT=snap-0adfaa42ce378623c
  - CKPT_BUCKET=s3://nelu-checkpoints
  - AWS_DEFAULT_REGION=us-west-2
  - VENV_S3_URL=s3://nelu-datasets/env/nelu-venv-py310-cu130.tar.gz
  - WANDB_PROJECT=gate-normalization
  - WANDB_ENTITY
  - WANDB_API_KEY

commands:
  - bash scripts/bootstrap.sh
